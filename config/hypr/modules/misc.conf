misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true

    focus_on_activate = false           # prevents apps from stealing focus
    mouse_move_enables_dpms = true      # wake screen on mouse move
    key_press_enables_dpms = true       # wake screen on keypress
    always_follow_on_dnd = true         # cursor follows drag and drop
    animate_manual_resizes = true       # smooth window resizing
    enable_swallow = true               # terminal swallows child apps (e.g. opening image in terminal)
    swallow_regex = kitty
}
