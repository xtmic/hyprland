$mainMod = SUPER 
$RofiScript = ~/.config/rofi/scripts/
$terminal = kitty
$fileManager = nemo

bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, C, exec, ~/.config/hypr/scripts/floating-cycle.sh
bind = $mainMod, D, exec, ~/.config/hypr/scripts/rotate-tiled.sh
bind = $mainMod SHIFT, P, exec, ~/.config/hypr/scripts/ultralow.sh
bind = $mainMod, L, exec, $RofiScript/powermenu_t2
bind = $mainMod, period, exec, $RofiScript/emoji

#ScreenShots
bind = $mainMod, S, exec, grimblast -n copy screen  
bind = $mainMod ALT, S, exec, python ~/.config/hypr/scripts/postimg-upload.py
bind = $mainMod SHIFT, S, exec, grimblast -n copysave area

#Screen Recording
bind = $mainMod, R, exec, ~/.config/hypr/scripts/screen-record.sh
bind = $mainMod SHIFT, R, exec, ~/.config/hypr/scripts/screen-record.sh -g

bind = $mainMod, V, exec, ~/.config/rofi/scripts/clipboard

bindr = SUPER, SUPER_L, exec, killall rofi || $RofiScript/launcher_t1 

cursor {
    zoom_factor = 1.0
    zoom_rigid = false
}

bind = SUPER, equal, exec, ~/.config/hypr/scripts/zoom.sh in
bind = SUPER, minus, exec, ~/.config/hypr/scripts/zoom.sh out
bind = SUPER, X,     exec, ~/.config/hypr/scripts/zoom.sh reset

# Minimize active window to top-right corner (only when 1 app on workspace)
bind = $mainMod, G, exec, ~/.config/hypr/scripts/resize-all-to-active.sh
bind = $mainMod, H, exec, ~/.config/hypr/scripts/minimize-h.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + ALT + [0-9]
bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5
bind = $mainMod ALT, 6, movetoworkspace, 6
bind = $mainMod ALT, 7, movetoworkspace, 7
bind = $mainMod ALT, 8, movetoworkspace, 8
bind = $mainMod ALT, 9, movetoworkspace, 9
bind = $mainMod ALT, 0, movetoworkspace, 10



# Bottom Terminal toggle (Super+`)
bind = $mainMod, grave, exec, ~/.config/hypr/scripts/term-toggle.sh

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = $mainMod, XF86AudioMute, exec, swaync-client --toggle-dnd
bindl  = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

# Brightness
bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Media
bindl = , XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bindl = , XF86AudioNext, exec, swayosd-client --playerctl next
bindl = , XF86AudioPrev, exec, swayosd-client --playerctl prev
