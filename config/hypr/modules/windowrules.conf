windowrule {
    # Ignore maximize requests from all apps
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}


windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    # Hyprland-run float position
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# Float common utility apps
windowrule {
    name = float-utilities
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|Calculator)$
    float = true
    center = true
}

# Float file dialogs
windowrule {
    name = float-file-dialogs
    match:title = ^(Open|Save|Save As|File Picker)(.*)$
    float = true
    center = true
    size = 800 600
}

windowrule {
    name = float-wifi
    match:title = wifi
    float = yes
    center = yes
    size = 800 500
}

windowrule {
    name = float-bluetooth
    match:title = bluetooth
    float = yes
    center = yes
    size = 800 500
}
windowrule {
    name = postimg-browser
    match:title = ^(.*)Google Chrome for Testing(.*)$
    workspace = 7 silent
}

# ── App Launcher Windows ─────────────────────────
windowrule {
    name = app-launcher-windows
    match:class = ^(app-launcher)$
    float = true
    center = true
    size = 60% 40%
    no_focus = true
}

# ── Bottom Terminal ──────────────────────────────
windowrule {
    name = bottomterm-float
    match:class = ^(bottomterm)$
    float = true
    pin = true
    opacity = 0.95 override
    move = 0 -0
    size = 100% 50%
    no_shadow = true
    no_blur = true
    suppress_event = maximize
    suppress_event = fullscreen
    suppress_event = fullscreenstate
}
